<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teste</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
     <!-- aqui eu passei o css do bootstrap -->
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <!-- aqui e a barra de navegacao do meu progeto, para o usuario pode transitar -->
            <ul class="nav justify-content-center">
                <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                <li class="nav-item"><a class="nav-link" href="contato.html">Contato</a></li>
                <li class="nav-item"><a class="nav-link" href="artigo.html">Artigo</a></li>
            </ul>
        </div>
    </nav>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Contato</h1>
        <p class="text-center">Preencha o formulário abaixo para entrar em contato:</p>

        <!-- aqui ha um pequeno formulario para contato -->
        <div class="row justify-content-center">
            <div class="col-md-6">
                  <form action="" method="post" enctype="text">
                    
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text" id="nome" name="nome" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="mensagem" class="form-label">Mensagem</label>
                        <!-- e esse `textarea` e um espaco maior para vc colocar sua informacoes no formulario -->
                        <textarea id="mensagem" name="mensagem" rows="5" class="form-control" required></textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary">Enviar</button>
                        <button type="reset" class="btn btn-secondary">Limpar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- aqui e o Bootstrap JS eu pesquisei e vi que era opcional colocar, eu coloquei para ficar mais dinamico o projeto-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
